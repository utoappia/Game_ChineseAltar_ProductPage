<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>心誠則靈 — 分享內容</title>
<meta name="description" content="檢視來自心誠則靈 App 的分享內容。" />
<!-- Shared links carry personal content in the fragment — keep them out of search. -->
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#11113F" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>" />
<style>
  html, body { margin: 0; height: 100%; background: #11113F; }
  .msg {
    font-family: "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    color: #e7cd97; text-align: center; padding-top: 40vh; font-size: 16px;
  }
  .msg a { color: #9fc0f5; }
</style>
</head>
<body>
  <!--
    Generic share dispatcher. Shared links are viewer.html#<type>=<blob>;
    each content type renders on its own page. We forward to that page,
    preserving the fragment (where the data lives) and any query string.
    Today the only type is the sky lantern → skylantern.html.
  -->
  <div class="msg">正在開啟…<br /><a id="manual" href="index.html">點此繼續</a></div>
<script>
'use strict';
(function () {
  var PAGES = { lantern: 'skylantern.html' };
  var hash = location.hash || '';            // "#lantern=<blob>"
  var type = hash.replace(/^#/, '').split('=')[0];
  var dest = PAGES[type] || 'index.html';
  var url = dest + location.search + hash;   // keep ?v=… and the fragment
  document.getElementById('manual').setAttribute('href', url);
  location.replace(url);
})();
</script>
</body>
</html>
