<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>心誠則靈 — 分享內容</title>
<meta name="description" content="檢視來自心誠則靈 App 的分享內容。" />
<!-- Shared links carry personal content in the fragment — keep them out of search. -->
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#b3261c" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏮</text></svg>" />
<style>
  /* Same palette as index.html (the landing page). */
  :root {
    --ink: #2a1c14;
    --paper: #fbf4e8;
    --red: #b3261c;
    --red-deep: #7d160f;
    --gold: #c79a4b;
    --gold-soft: #e7cd97;
    --muted: #6f5d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei",
      "Hiragino Sans", system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; }
  .wrap { width: min(720px, 92vw); margin: 0 auto; }

  header {
    text-align: center;
    padding: 26px 0 18px;
    background: linear-gradient(180deg, #fde6d6 0%, var(--paper) 100%);
  }
  header a { text-decoration: none; }
  header .name {
    font-size: 26px;
    letter-spacing: .14em;
    color: var(--red-deep);
    font-weight: 700;
  }
  header .sub { font-size: 13px; color: var(--muted); letter-spacing: .06em; }

  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 0 40px; }
  /* The stage — each content renderer owns everything inside. */
  #stage { width: min(720px, 92vw); text-align: center; }

  .card {
    background: #fffdf8;
    border: 1px solid var(--gold-soft);
    border-radius: 16px;
    padding: 40px 26px;
    box-shadow: 0 10px 26px rgba(125, 22, 15, .08);
  }
  .card h2 { color: var(--red-deep); letter-spacing: .1em; margin-bottom: 10px; font-size: 22px; }
  .card p { color: var(--muted); font-size: 15px; }
  .card .big { font-size: 56px; line-height: 1.2; margin-bottom: 10px; }

  .store-row { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .store-row a {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 999px;
    background: var(--red);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    letter-spacing: .04em;
    box-shadow: 0 6px 16px rgba(125, 22, 15, .25);
  }
  .store-row a.alt { background: #fff; color: var(--red-deep); border: 1px solid var(--gold); box-shadow: none; }

  footer { text-align: center; padding: 18px 0 26px; color: var(--muted); font-size: 13px; }
  footer a { margin: 0 8px; }
</style>
</head>
<body>
  <header>
    <a href="index.html">
      <div class="name">心誠則靈</div>
      <div class="sub">隨身的數位香火</div>
    </a>
  </header>

  <main><div id="stage"></div></main>

  <footer>
    <div class="wrap">
      <a href="index.html">關於 App</a>
      <a href="https://apps.apple.com/app/%E5%BF%83%E8%AA%A0%E5%89%87%E9%9D%88/id1399972449" target="_blank" rel="noopener">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=com.utoappia.worshipapp" target="_blank" rel="noopener">Google Play</a>
    </div>
  </footer>

<script>
'use strict';
/**
 * Generic share-content viewer.
 *
 * The app shares URLs of the form  viewer.html#<type>=<base64url-blob>
 * (data rides in the FRAGMENT so it never reaches any server). Each content
 * type registers a renderer in VIEWERS; adding a new shareable thing later
 * (e.g. an altar snapshot) is one more entry — the shell stays unchanged.
 *
 * Blob convention (per type, mirrors the app side):
 *   version byte(s) · payload · FNV-1a checksum (4B, big-endian)
 * A truncated or mangled link fails the checksum and is rejected outright,
 * never half-rendered.
 */

const APP_STORE_URL = 'https://apps.apple.com/app/%E5%BF%83%E8%AA%A0%E5%89%87%E9%9D%88/id1399972449';
const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.utoappia.worshipapp';

// ── helpers ────────────────────────────────────────────────────────────────

/** base64url → Uint8Array (returns null on malformed input). */
function decodeBase64url(s) {
  try {
    const b64 = s.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((s.length + 3) % 4);
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  } catch { return null; }
}

/** FNV-1a 32-bit over bytes. */
function fnv1a(bytes) {
  let h = 0x811c9dc5;
  for (let i = 0; i < bytes.length; i++) {
    h ^= bytes[i];
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h >>> 0;
}

/** Verify + strip the trailing 4-byte checksum; null if it doesn't match. */
function checkedPayload(bytes) {
  if (!bytes || bytes.length < 5) return null;
  const body = bytes.subarray(0, bytes.length - 4);
  const want = new DataView(bytes.buffer, bytes.byteOffset + bytes.length - 4, 4).getUint32(0);
  return fnv1a(body) === want ? body : null;
}

function storeRow() {
  return '<div class="store-row">' +
    '<a href="' + APP_STORE_URL + '" target="_blank" rel="noopener">App Store 下載</a>' +
    '<a class="alt" href="' + PLAY_STORE_URL + '" target="_blank" rel="noopener">Google Play 下載</a>' +
    '</div>';
}

function showCard(emoji, title, text) {
  document.getElementById('stage').innerHTML =
    '<div class="card"><div class="big">' + emoji + '</div><h2>' + title + '</h2><p>' + text + '</p>' + storeRow() + '</div>';
}

// ── content renderers ──────────────────────────────────────────────────────

// ── 天燈 (sky lantern) ──────────────────────────────────────────────────────
// Decodes the stroke blob and renders the floating lantern on a Canvas2D —
// a hand port of the app's renderer (src/components/lantern/geometry.ts +
// LanternFlight.tsx). Keep the constants in sync with the app.

const LANTERN_BRUSH_COLORS = ['#c0392b', '#222222', '#d9912f', '#2e7d32', '#a64ca6', '#2456a6'];
const LANTERN_PAPER_COLORS = ['#e8a33d'];
const L_TOP = 1.0, L_BOT = 0.62, L_H = 1.5, L_OPEN = 0.5, L_FOCAL = 5;

/** Blob v1: ver(1) flags(1) paper(1) wishLen(1) wish strokeCount(2)
 *  per stroke [face<<6|color (1) count(2) points u,v (1B each)] */
function decodeLanternBlob(encoded) {
  const body = checkedPayload(decodeBase64url(encoded));
  if (!body || body[0] !== 1) return null;
  let i = 1;
  i++; // flags
  const paperColor = body[i++];
  const wishLen = body[i++];
  if (i + wishLen > body.length) return null;
  const wish = wishLen ? new TextDecoder().decode(body.subarray(i, i + wishLen)) : '';
  i += wishLen;
  if (i + 2 > body.length) return null;
  const strokeCount = (body[i] << 8) | body[i + 1];
  i += 2;
  const strokes = [];
  for (let s = 0; s < strokeCount; s++) {
    if (i + 3 > body.length) return null;
    const fc = body[i++];
    const count = (body[i] << 8) | body[i + 1];
    i += 2;
    if (i + count * 2 > body.length) return null;
    const points = [];
    for (let p = 0; p < count; p++) { points.push({ u: body[i] / 255, v: body[i + 1] / 255 }); i += 2; }
    strokes.push({ face: (fc >> 6) & 3, color: fc & 63, points });
  }
  return { strokes, wish, paperColor };
}

function lanternHalfAt(v) { return L_TOP + (L_BOT - L_TOP) * v; }
function lanternProject(face, u, v, yaw) {
  const h = lanternHalfAt(v);
  const lx = (2 * u - 1) * h, lz = h;
  const a = yaw + (face * Math.PI) / 2;
  const cos = Math.cos(a), sin = Math.sin(a);
  const x = lx * cos + lz * sin, z = -lx * sin + lz * cos;
  const s = L_FOCAL / (L_FOCAL - z);
  return { x: x * s, y: v * L_H * s };
}
function lanternFacing(face, yaw) { return Math.cos(yaw + (face * Math.PI) / 2); }
function lanternShade(hex, brightness, warmth) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  const warm = (c, w) => c + (w - c) * warmth;
  return 'rgb(' + Math.round(Math.min(255, warm(r, 255) * brightness)) + ',' +
    Math.round(Math.min(255, warm(g, 214) * brightness)) + ',' +
    Math.round(Math.min(255, warm(b, 120) * brightness)) + ')';
}

function renderLantern(encoded) {
  const data = decodeLanternBlob(encoded);
  if (!data) {
    showCard('🏮', '連結無法讀取', '這個天燈連結似乎不完整或已損毀，請重新複製完整網址再試一次。');
    return;
  }
  const stage = document.getElementById('stage');
  const wishLine = data.wish
    ? '<p style="font-size:18px;color:var(--red-deep);letter-spacing:.12em;margin-top:14px;">「' + data.wish.replace(/[<>&]/g, '') + '」</p>'
    : '';
  stage.innerHTML =
    '<div class="card" style="padding:18px 14px 26px;">' +
    '<canvas id="lantern-canvas" style="width:100%;max-width:420px;border-radius:12px;"></canvas>' +
    wishLine +
    '<p style="margin-top:10px;">有人為你放了一盞天燈 🏮</p>' +
    storeRow() +
    '</div>';

  const canvas = document.getElementById('lantern-canvas');
  const cssW = Math.min(420, canvas.parentElement.clientWidth - 28);
  const cssH = Math.round(cssW * 1.35);
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const paper = LANTERN_PAPER_COLORS[data.paperColor] || LANTERN_PAPER_COLORS[0];
  const baseScale = cssW * 0.34;
  const start = performance.now();

  function frame(nowMs) {
    const t = (nowMs - start) / 1000;
    const yaw = 0.32 * Math.sin(t * 0.35) + t * 0.06;
    const flicker = 1 + 0.1 * Math.sin(t * 13) + 0.06 * Math.sin(t * 29 + 1.7);
    const cx = cssW / 2 + Math.sin(t * 0.55) * cssW * 0.03;
    const cy = cssH * 0.22 + Math.sin(t * 0.8) * cssH * 0.01;

    // dusk sky
    const sky = ctx.createLinearGradient(0, 0, 0, cssH);
    sky.addColorStop(0, '#2b3a67'); sky.addColorStop(0.55, '#7c5a8c'); sky.addColorStop(1, '#e8a07a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, cssW, cssH);

    ctx.save();
    ctx.translate(cx, cy);

    // halo
    const haloY = L_H * baseScale * 0.6;
    const halo = ctx.createRadialGradient(0, haloY, 0, 0, haloY, baseScale * 2.1);
    halo.addColorStop(0, 'rgba(255,196,110,0.28)'); halo.addColorStop(1, 'rgba(255,196,110,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(-baseScale * 2.2, haloY - baseScale * 2.2, baseScale * 4.4, baseScale * 4.4);

    // faces back-to-front, then their strokes
    const faces = [0, 1, 2, 3].filter((f) => lanternFacing(f, yaw) > 0.02)
      .sort((a, b) => lanternFacing(a, yaw) - lanternFacing(b, yaw));
    for (const f of faces) {
      const q = [
        lanternProject(f, 0, 0, yaw), lanternProject(f, 1, 0, yaw),
        lanternProject(f, 1, 1, yaw), lanternProject(f, 0, 1, yaw),
      ];
      ctx.beginPath();
      q.forEach((p, i) => (i ? ctx.lineTo(p.x * baseScale, p.y * baseScale) : ctx.moveTo(p.x * baseScale, p.y * baseScale)));
      ctx.closePath();
      const brightness = Math.max(0, lanternFacing(f, yaw)) * 0.45 + 0.55;
      ctx.fillStyle = lanternShade(paper, brightness, 0.35);
      ctx.fill();
      ctx.strokeStyle = 'rgba(120,70,20,0.35)';
      ctx.lineWidth = 1;
      ctx.stroke();
      // strokes on this face
      ctx.lineWidth = L_H * baseScale * 0.022;
      ctx.lineCap = ctx.lineJoin = 'round';
      for (const s of data.strokes) {
        if (s.face !== f || s.points.length < 2) continue;
        ctx.beginPath();
        s.points.forEach((pt, i) => {
          const p = lanternProject(f, pt.u, pt.v, yaw);
          if (i) ctx.lineTo(p.x * baseScale, p.y * baseScale);
          else ctx.moveTo(p.x * baseScale, p.y * baseScale);
        });
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = LANTERN_BRUSH_COLORS[s.color] || LANTERN_BRUSH_COLORS[0];
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // bottom opening + flame
    ctx.beginPath();
    for (let i = 0; i < 20; i++) {
      const a = (i / 20) * Math.PI * 2;
      const px = Math.cos(a) * L_OPEN, pz = Math.sin(a) * L_OPEN;
      const cos = Math.cos(yaw), sin = Math.sin(yaw);
      const x = px * cos + pz * sin, z = -px * sin + pz * cos;
      const s = L_FOCAL / (L_FOCAL - z);
      const X = x * s * baseScale, Y = L_H * s * baseScale;
      if (i) ctx.lineTo(X, Y); else ctx.moveTo(X, Y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(40,18,4,0.88)';
    ctx.fill();
    const flameY = L_H * baseScale * 0.97;
    const fr = baseScale * 0.34 * flicker;
    const flame = ctx.createRadialGradient(0, flameY, 0, 0, flameY, fr);
    flame.addColorStop(0, 'rgba(255,232,170,0.95)');
    flame.addColorStop(0.5, 'rgba(255,150,40,0.55)');
    flame.addColorStop(1, 'rgba(255,120,20,0)');
    ctx.fillStyle = flame;
    ctx.beginPath(); ctx.arc(0, flameY, fr, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,250,225,0.95)';
    ctx.beginPath(); ctx.arc(0, flameY, baseScale * 0.12 * flicker, 0, Math.PI * 2); ctx.fill();

    // 祈願文 — vertical column over the lantern front
    if (data.wish) {
      const fs = baseScale * 0.22;
      ctx.font = '600 ' + fs + 'px "PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif';
      ctx.fillStyle = 'rgba(112,30,20,0.92)';
      ctx.textAlign = 'center';
      [...data.wish].forEach((ch, i) => {
        ctx.fillText(ch, 0, baseScale * 0.34 + i * fs * 1.12);
      });
    }

    ctx.restore();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/** type key in the URL fragment → renderer. */
const VIEWERS = {
  lantern: renderLantern,
};

// ── router ─────────────────────────────────────────────────────────────────

function route() {
  const m = location.hash.match(/^#([a-z][\w-]*)=(.+)$/);
  const render = m && VIEWERS[m[1]];
  if (render) render(m[2]);
  else showCard('🙏', '沒有可顯示的內容', '請透過 App 分享的連結開啟本頁。');
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
