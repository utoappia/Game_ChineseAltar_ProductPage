<script>
'use strict';
/**
 * Generic share-content viewer.
 *
 * The app shares URLs of the form  viewer.html#<type>=<base64url-blob>
 * (data rides in the FRAGMENT so it never reaches any server). Each content
 * type registers a renderer in VIEWERS; adding a new shareable thing later
 * (e.g. an altar snapshot) is one more entry — the shell stays unchanged.
 *
 * Blob convention (per type, mirrors the app side):
 *   version byte(s) · payload · FNV-1a checksum (4B, big-endian)
 * A truncated or mangled link fails the checksum and is rejected outright,
 * never half-rendered.
 */

const APP_STORE_URL = 'https://apps.apple.com/app/%E5%BF%83%E8%AA%A0%E5%89%87%E9%9D%88/id1399972449';
const PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.utoappia.worshipapp';

// ── helpers ────────────────────────────────────────────────────────────────

/** base64url → Uint8Array (returns null on malformed input). */
function decodeBase64url(s) {
  try {
    const b64 = s.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((s.length + 3) % 4);
    const bin = atob(b64);
    const out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  } catch { return null; }
}

/** FNV-1a 32-bit over bytes. */
function fnv1a(bytes) {
  let h = 0x811c9dc5;
  for (let i = 0; i < bytes.length; i++) {
    h ^= bytes[i];
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h >>> 0;
}

/** Verify + strip the trailing 4-byte checksum; null if it doesn't match. */
function checkedPayload(bytes) {
  if (!bytes || bytes.length < 5) return null;
  const body = bytes.subarray(0, bytes.length - 4);
  const want = new DataView(bytes.buffer, bytes.byteOffset + bytes.length - 4, 4).getUint32(0);
  return fnv1a(body) === want ? body : null;
}

function storeRow() {
  return '<div class="store-row">' +
    '<a href="' + APP_STORE_URL + '" target="_blank" rel="noopener">' +
    '<img class="badge" src="assets/badge-appstore.svg" alt="Download on the App Store" /></a>' +
    '<a href="' + PLAY_STORE_URL + '" target="_blank" rel="noopener">' +
    '<img class="badge" src="assets/badge-googleplay.png" alt="Get it on Google Play" /></a>' +
    '</div>';
}

function showCard(emoji, title, text) {
  document.getElementById('stage').innerHTML =
    '<div class="card"><div class="big">' + emoji + '</div><h2>' + title + '</h2><p>' + text + '</p>' + storeRow() + '</div>';
}

// ── content renderers ──────────────────────────────────────────────────────

// ── 天燈 (sky lantern) ──────────────────────────────────────────────────────
// Decodes the stroke blob and renders the floating lantern on a Canvas2D —
// a hand port of the app's renderer (src/components/lantern/geometry.ts +
// LanternFlight.tsx). Keep the constants in sync with the app.

const LANTERN_BRUSH_COLORS = ['#c0392b', '#222222', '#d9912f', '#2e7d32', '#a64ca6', '#2456a6'];
const LANTERN_BRUSH_SIZES = [0.01, 0.015, 0.022, 0.034, 0.05]; // 特細..特粗
const DEFAULT_BRUSH_FRAC = 0.022;
const LANTERN_PAPER_COLORS = ['#e8a33d'];
const L_TOP = 1.0, L_H = 2.0, L_OPEN = 0.6, L_FOCAL = 5, L_PITCH = 0.24;
// Inflated paper profile + square→circle cross-section (port of geometry.ts)
const L_PROFILE = [[0, 1.0], [0.22, 1.06], [0.52, 1.0], [0.8, 0.8], [1, L_OPEN / L_TOP]];
function lClamp01(x) { return Math.min(1, Math.max(0, x)); }
function lSmoothstep(a, b, x) { const t = lClamp01((x - a) / (b - a)); return t * t * (3 - 2 * t); }
function lanternRoundness(v) { return 0.12 + 0.88 * lSmoothstep(0.45, 1, lClamp01(v)); }

/** Blob v1: ver flags paper wishLen wish strokes  (wish → converted to a
 *  vertical text item on face 0, matching how v1 rendered it).
 *  Blob v2: ver flags paper strokeCount(2B) strokes textCount(1B)
 *  per text [ face<<6|color · direction · u · v · size · byteLen · utf8 ]. */
function decodeLanternBlob(encoded) {
  const body = checkedPayload(decodeBase64url(encoded));
  if (!body) return null;
  const version = body[0];
  if (version < 1 || version > 5) return null;
  let i = 1;
  const flags = body[i++];
  const paperColor = body[i++];
  let v1Wish = '';
  if (version === 1) {
    const wishLen = body[i++];
    if (i + wishLen > body.length) return null;
    v1Wish = wishLen ? new TextDecoder().decode(body.subarray(i, i + wishLen)) : '';
    i += wishLen;
  }
  if (i + 2 > body.length) return null;
  const strokeCount = (body[i] << 8) | body[i + 1];
  i += 2;
  const strokes = [];
  for (let s = 0; s < strokeCount; s++) {
    if (i + 1 > body.length) return null;
    const fc = body[i++];
    let width;
    if (version >= 4) {
      if (i + 1 > body.length) return null;
      const sz = body[i++];
      width = LANTERN_BRUSH_SIZES[sz] != null ? LANTERN_BRUSH_SIZES[sz] : DEFAULT_BRUSH_FRAC;
    }
    if (i + 2 > body.length) return null;
    const count = (body[i] << 8) | body[i + 1];
    i += 2;
    if (i + count * 2 > body.length) return null;
    const points = [];
    for (let p = 0; p < count; p++) { points.push({ u: body[i] / 255, v: body[i + 1] / 255 }); i += 2; }
    strokes.push({ face: (fc >> 6) & 3, erase: (fc & 0x20) !== 0, color: fc & 0x1f, width, points });
  }
  const texts = [];
  if (version === 1) {
    if (v1Wish) {
      const n = [...v1Wish].length;
      texts.push({ face: 0, color: 0, direction: 1, u: 0.5, v: 0.5,
        size: Math.min(0.15, 0.64 / Math.max(1, n)), text: v1Wish });
    }
  } else {
    if (i + 1 > body.length) return null;
    const textCount = body[i++];
    for (let t = 0; t < textCount; t++) {
      if (i + 6 > body.length) return null;
      const fc = body[i++];
      const direction = body[i++] % 3;
      const u = body[i++] / 255, v = body[i++] / 255, size = body[i++] / 255;
      const len = body[i++];
      if (i + len > body.length) return null;
      const text = new TextDecoder().decode(body.subarray(i, i + len));
      i += len;
      texts.push({ face: (fc >> 6) & 3, color: fc & 63, direction, u, v, size, text });
    }
  }
  // message (v3+); v1/v2 have none. The encoder writes the message block for
  // every version >= 3 (incl. v4/v5), so read it for all of them — gating on
  // `=== 3` silently dropped messages on v4/v5 lanterns.
  let message = '';
  if (version >= 3) {
    if (i + 2 > body.length) return null;
    const msgLen = (body[i] << 8) | body[i + 1];
    i += 2;
    if (i + msgLen > body.length) return null;
    message = msgLen ? new TextDecoder().decode(body.subarray(i, i + msgLen)) : '';
    i += msgLen;
  }

  // lit time (點亮時間): 8-byte big-endian epoch SECONDS at the end of the body,
  // present only when flags bit 0x01 is set (v5+). Combine the 32-bit halves
  // with multiplication (epoch seconds is well within Number.MAX_SAFE_INTEGER).
  let litAt; // epoch ms, or undefined
  if (version >= 3 && (flags & 0x01)) {
    if (i + 8 > body.length) return null;
    const hi = ((body[i] << 24) | (body[i + 1] << 16) | (body[i + 2] << 8) | body[i + 3]) >>> 0;
    const lo = ((body[i + 4] << 24) | (body[i + 5] << 16) | (body[i + 6] << 8) | body[i + 7]) >>> 0;
    i += 8;
    litAt = (hi * 0x100000000 + lo) * 1000;
  }
  return { strokes, texts, paperColor, message, litAt };
}

/** Characters of a text item laid out around its center anchor in unit face
 *  coords (port of the app's layoutTextChars). */
function lanternLayoutText(t) {
  const chars = t.direction === 2 ? [...t.text].reverse() : [...t.text];
  const n = chars.length;
  if (n === 0) return [];
  if (t.direction === 1) {
    const step = t.size * 1.12;
    const start = t.v - ((n - 1) / 2) * step;
    return chars.map((ch, i) => ({ ch, u: t.u, v: start + i * step }));
  }
  const stepU = (t.size * 1.05 * L_H) / (2 * lanternHalfAt(t.v));
  const start = t.u - ((n - 1) / 2) * stepU;
  return chars.map((ch, i) => ({ ch, u: start + i * stepU, v: t.v }));
}

function lanternHalfAt(v) {
  const x = lClamp01(v);
  let i = 0;
  while (i < L_PROFILE.length - 2 && x > L_PROFILE[i + 1][0]) i++;
  const v0 = L_PROFILE[i][0], p0 = L_PROFILE[i][1];
  const v1 = L_PROFILE[i + 1][0], p1 = L_PROFILE[i + 1][1];
  const t = lClamp01((x - v0) / (v1 - v0));
  const tt = (1 - Math.cos(Math.PI * t)) / 2;
  return L_TOP * (p0 + (p1 - p0) * tt);
}
// ── three.js renderer — the same GLB + stroke-atlas approach as the app ─────
// The blob's strokes/texts are rasterized into a 1024² canvas atlas whose
// quadrants match the model's UVs; the lantern floats lit against the dusk
// sky (CSS gradient behind a transparent WebGL canvas).

const ATLAS = 1024, AQ = ATLAS / 2;
const AQUAD = [[0, 0], [AQ, 0], [0, AQ], [AQ, AQ]];

function buildAtlasCanvas(data) {
  const c = document.createElement('canvas');
  c.width = ATLAS; c.height = ATLAS;
  const ctx = c.getContext('2d');
  ctx.fillStyle = LANTERN_PAPER_COLORS[data.paperColor] || LANTERN_PAPER_COLORS[0];
  ctx.fillRect(0, 0, ATLAS, ATLAS);
  // rice-paper texture: broad pulp mottling + fine fiber grain, overlaid on
  // the paper. The glow atlas derives from this canvas, so the mottling shows
  // through the lit paper — the translucency of real 棉紙.
  const noiseLayer = (cells, alpha) => {
    const n = document.createElement('canvas');
    n.width = n.height = cells;
    const nctx = n.getContext('2d');
    const img = nctx.createImageData(cells, cells);
    for (let i = 0; i < img.data.length; i += 4) {
      const g = 96 + Math.floor(Math.random() * 128);
      img.data[i] = img.data[i + 1] = img.data[i + 2] = g;
      img.data[i + 3] = 255;
    }
    nctx.putImageData(img, 0, 0);
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = alpha;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(n, 0, 0, ATLAS, ATLAS);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  };
  noiseLayer(26, 0.16); // pulp-density blotches
  ctx.lineCap = ctx.lineJoin = 'round';

  // strokes on a separate transparent layer so eraser strokes
  // (destination-out) reveal the paper below, then composite onto the paper
  const sc = document.createElement('canvas');
  sc.width = ATLAS; sc.height = ATLAS;
  const sctx = sc.getContext('2d');
  sctx.lineCap = sctx.lineJoin = 'round';
  for (const s of data.strokes) {
    if (s.points.length < 2) continue;
    sctx.lineWidth = (s.width != null ? s.width : DEFAULT_BRUSH_FRAC) * AQ;
    const [qx, qy] = AQUAD[s.face];
    sctx.beginPath();
    s.points.forEach((p, i) => {
      const x = qx + p.u * AQ, y = qy + p.v * AQ;
      if (i) sctx.lineTo(x, y); else sctx.moveTo(x, y);
    });
    sctx.globalCompositeOperation = s.erase ? 'destination-out' : 'source-over';
    sctx.strokeStyle = s.erase ? '#000' : (LANTERN_BRUSH_COLORS[s.color] || LANTERN_BRUSH_COLORS[0]);
    sctx.stroke();
  }
  ctx.drawImage(sc, 0, 0);
  ctx.textAlign = 'center';
  for (const t of data.texts) {
    if (!t.text) continue;
    const [qx, qy] = AQUAD[t.face];
    const px = Math.max(6, t.size * AQ);
    ctx.font = '600 ' + px + 'px "PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif';
    ctx.fillStyle = LANTERN_BRUSH_COLORS[t.color] || LANTERN_BRUSH_COLORS[0];
    for (const ch of lanternLayoutText(t)) {
      ctx.fillText(ch.ch, qx + ch.u * AQ, qy + ch.v * AQ + px * 0.36);
    }
  }
  // fine fiber grain OVER the ink — drawn after strokes/texts so drawings
  // read as stained into the paper fibers, not printed on top
  noiseLayer(240, 0.08);

  // crease shading — darken each face toward its left/right edges so the
  // corner folds between panels read clearly (normal-independent; the glow
  // canvas is derived from this one, so it inherits the creases)
  ctx.globalCompositeOperation = 'multiply';
  const W = AQ * 0.08;
  for (const [qx, qy] of AQUAD) {
    for (const [x0, x1] of [[qx, qx + W], [qx + AQ, qx + AQ - W]]) {
      const g = ctx.createLinearGradient(x0, 0, x1, 0);
      g.addColorStop(0, 'rgb(238,238,238)');
      g.addColorStop(1, 'rgb(255,255,255)');
      ctx.fillStyle = g;
      ctx.fillRect(Math.min(x0, x1), qy, W, AQ);
    }
  }
  ctx.globalCompositeOperation = 'source-over';
  return c;
}

function buildGlowCanvas(colorCanvas) {
  // emissive = color atlas × vertical falloff per quadrant — real lanterns
  // glow brightest at the mouth and fade up the paper
  const c = document.createElement('canvas');
  c.width = ATLAS; c.height = ATLAS;
  const ctx = c.getContext('2d');
  ctx.drawImage(colorCanvas, 0, 0);
  // transmitted light varies more than reflected — extra pulp mottling on
  // the GLOW only, so the lit paper shimmers with density variation
  {
    const n = document.createElement('canvas');
    n.width = n.height = 22;
    const nctx = n.getContext('2d');
    const img = nctx.createImageData(22, 22);
    for (let i = 0; i < img.data.length; i += 4) {
      const g = 96 + Math.floor(Math.random() * 128);
      img.data[i] = img.data[i + 1] = img.data[i + 2] = g;
      img.data[i + 3] = 255;
    }
    nctx.putImageData(img, 0, 0);
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = 0.3;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(n, 0, 0, ATLAS, ATLAS);
    ctx.globalAlpha = 1;
  }
  ctx.globalCompositeOperation = 'multiply';
  for (const [qx, qy] of AQUAD) {
    const g = ctx.createLinearGradient(0, qy, 0, qy + AQ);
    g.addColorStop(0, 'rgb(56,52,48)');
    g.addColorStop(1, 'rgb(255,255,255)');
    ctx.fillStyle = g;
    ctx.fillRect(qx, qy, AQ, AQ);
  }
  return c;
}

function coreSpriteTexture(THREE) {
  const N = 64;
  const c = document.createElement('canvas');
  c.width = N; c.height = N;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(N / 2, N / 2, 0, N / 2, N / 2, N / 2);
  g.addColorStop(0, 'rgba(255,252,235,1)');
  g.addColorStop(0.35, 'rgba(255,250,220,0.55)');
  g.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, N, N);
  return new THREE.CanvasTexture(c);
}

function creaseBrightness(x, z) {
  const ang = Math.atan2(x, z);
  const face = Math.floor(((ang * 180 / Math.PI + 45 + 360) % 360) / 90);
  let psi = ang - face * (Math.PI / 2);
  while (psi > Math.PI) psi -= 2 * Math.PI;
  while (psi < -Math.PI) psi += 2 * Math.PI;
  const u = Math.min(1, Math.max(0, 0.5 + psi / (Math.PI / 2)));
  const d = Math.min(u, 1 - u);
  const W = 0.08, MIN = 238 / 255;
  return d < W ? MIN + (1 - MIN) * (d / W) : 1;
}

function flameSpriteTexture(THREE) {
  const N = 64;
  const c = document.createElement('canvas');
  c.width = N; c.height = N;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(N / 2, N / 2, 0, N / 2, N / 2, N / 2);
  g.addColorStop(0, 'rgba(255,252,230,1)');
  g.addColorStop(0.45, 'rgba(255,200,100,0.95)');
  g.addColorStop(0.8, 'rgba(255,150,50,0.35)');
  g.addColorStop(1, 'rgba(255,140,40,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, N, N);
  return new THREE.CanvasTexture(c);
}

let threeModules = null;
function loadThree() {
  // dynamic import — works without import-map support (Safari < 16.4); the
  // +esm build rewrites three's bare imports so both share one instance
  if (!threeModules) {
    threeModules = Promise.all([
      // esm.sh transpiles to es2017 — three 0.184 itself uses static class
      // blocks, which Safari only parses from 16.4
      import('https://esm.sh/three@0.184.0?target=es2017'),
      import('https://esm.sh/three@0.184.0/examples/jsm/loaders/GLTFLoader.js?target=es2017'),
      import('https://esm.sh/three@0.184.0/examples/jsm/utils/BufferGeometryUtils.js?target=es2017'),
    ]).then(([three, loader, bgu]) => ({ THREE: three, GLTFLoader: loader.GLTFLoader, mergeVertices: bgu.mergeVertices }));
  }
  return threeModules;
}

/** "點亮時間：YYYY-MM-DD HH:MM:SS TZ" in the viewer's local time zone, from the
 *  time baked into the blob (data.litAt, epoch ms). Returns '' when absent. */
function lightUpTimeLine(litAtMs) {
  const ms = Number.isFinite(litAtMs) ? litAtMs : NaN;
  if (!Number.isFinite(ms) || ms <= 0) return '';
  const d = new Date(ms);
  if (isNaN(d.getTime())) return '';
  const p = (n) => String(n).padStart(2, '0');
  const stamp =
    d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) +
    ' ' + p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
  let tz = '';
  try {
    const parts = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' }).formatToParts(d);
    const t = parts.find((x) => x.type === 'timeZoneName');
    if (t) tz = ' ' + t.value;
  } catch (e) { /* ignore */ }
  return '<p style="font-size:13px;color:#9a9a9a;letter-spacing:.04em;margin-top:6px;">點亮時間：' +
    stamp + tz + '</p>';
}

async function renderLantern(encoded) {
  const data = decodeLanternBlob(encoded);
  if (!data) {
    showCard('🏮', '連結無法讀取', '這個天燈連結似乎不完整或已損毀，請重新複製完整網址再試一次。');
    return;
  }
  let THREE, GLTFLoader, mergeVertices;
  try {
    ({ THREE, GLTFLoader, mergeVertices } = await loadThree());
  } catch {
    showCard('🏮', '無法顯示天燈', '3D 元件載入失敗，請檢查網路後重試，或下載 App 觀看。');
    return;
  }
  const stage = document.getElementById('stage');
  // the lantern's optional message (the faces carry only the drawings); the
  // texts are graphics, not the caption
  const caption = (data.message || '').trim();
  const wishLine = caption
    ? '<p style="font-size:18px;color:var(--red-deep);letter-spacing:.12em;margin-top:14px;">' + caption.replace(/[<>&]/g, '') + '</p>'
    : '';
  // Light-up time (點亮時間) — baked into the blob (data.litAt). Rendered in the
  // VIEWER's local time zone, smaller + grey, below the message.
  const litLine = lightUpTimeLine(data.litAt);
  stage.innerHTML =
    '<div class="card" style="padding:18px 14px 26px;">' +
    '<canvas id="lantern-canvas" style="width:100%;max-width:420px;border-radius:12px;' +
    'background:linear-gradient(180deg,#16203a 0%,#2c3f68 100%);"></canvas>' +
    wishLine +
    litLine +
    '</div>' +
    storeRow(); // below the white card, side by side

  const canvas = document.getElementById('lantern-canvas');
  const cssW = Math.min(420, canvas.parentElement.clientWidth - 28);
  const cssH = Math.round(cssW * 1.35);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';

  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  } catch {
    showCard('🏮', '無法顯示天燈', '您的瀏覽器不支援 3D 顯示，請改用較新的瀏覽器，或下載 App 觀看。');
    return;
  }
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  renderer.setSize(cssW, cssH, false);
  renderer.setClearColor(0x000000, 0);

  // swipe / drag to turn the lantern (touch + mouse); vertical swipes still
  // scroll the page (touch-action: pan-y)
  let userYaw = 0, yawVel = 0, draggingYaw = false, lastDragX = 0;
  canvas.style.touchAction = 'pan-y';
  canvas.style.cursor = 'grab';
  canvas.addEventListener('pointerdown', (e) => {
    draggingYaw = true; lastDragX = e.clientX; yawVel = 0;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!draggingYaw) return;
    const dx = e.clientX - lastDragX;
    lastDragX = e.clientX;
    userYaw += dx * 0.012;
    yawVel = dx * 0.012;
  });
  const endDrag = () => { draggingYaw = false; };
  canvas.addEventListener('pointerup', endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, cssW / cssH, 0.1, 100);
  camera.position.set(0, 0, 8.6);
  camera.lookAt(0, 2.3, 0);

  scene.add(new THREE.AmbientLight(0xa2a2ba, 1.5));
  const flameLight = new THREE.PointLight(0xffb050, 0, 5);
  flameLight.position.set(0, 0.25, 0);

  const colorCanvas = buildAtlasCanvas(data);
  const mkTex = (cnv) => {
    const t = new THREE.CanvasTexture(cnv);
    t.flipY = false; // glTF UV convention (v down) — atlas rows already match
    t.colorSpace = THREE.SRGBColorSpace;
    t.anisotropy = 4;
    // no mipmaps: minified sampling blends across quadrant borders (bright
    // mouth glow would bleed onto the adjacent faces' top edges)
    t.generateMipmaps = false;
    t.minFilter = THREE.LinearFilter;
    return t;
  };
  const atlas = mkTex(colorCanvas);
  const glowAtlas = mkTex(buildGlowCanvas(colorCanvas));
  const paperColor = new THREE.Color(LANTERN_PAPER_COLORS[data.paperColor] || LANTERN_PAPER_COLORS[0]);
  const bodyMat = new THREE.MeshStandardMaterial({
    map: atlas, roughness: 0.95, metalness: 0, side: THREE.BackSide,
    emissive: new THREE.Color(0xffb060), emissiveMap: glowAtlas, emissiveIntensity: 0,
  });
  // up-facing normals catch the hemisphere light at full strength — darken
  // the cap so the top reads dimmer than the glowing body
  const capColor = paperColor.clone().multiplyScalar(1.0);
  const capMat = new THREE.MeshStandardMaterial({
    color: capColor, roughness: 1, metalness: 0, side: THREE.DoubleSide,
    emissive: new THREE.Color(0xffb060).multiply(paperColor), emissiveIntensity: 0,
    vertexColors: true, // edge-shadow baked per vertex (see cap load below)
  });

  // dark interior shell (backfaces only): the mouth shows a dim cavity
  // warmed by the flame light, so the fireball reads against it
  const interiorMat = new THREE.MeshStandardMaterial({
    color: paperColor.clone().multiplyScalar(0.13),
    roughness: 1, metalness: 0, side: THREE.FrontSide,
  });

  const flame = new THREE.Sprite(new THREE.SpriteMaterial({
    map: flameSpriteTexture(THREE), transparent: true, depthWrite: false, opacity: 0,
    blending: THREE.AdditiveBlending, // light adds — punchy fireball
  }));
  flame.scale.set(0.85, 1.1, 1);
  flame.position.set(0, 0.34, 0);
  // white-hot inner core, flickering out of phase with the halo
  const flameCore = new THREE.Sprite(new THREE.SpriteMaterial({
    map: coreSpriteTexture(THREE), transparent: true, depthWrite: false, opacity: 0,
    blending: THREE.AdditiveBlending,
  }));
  flameCore.position.set(0, 0.3, 0);

  const group = new THREE.Group();
  group.add(flameLight);
  group.add(flame);
  group.add(flameCore);
  scene.add(group);

  // ── atmosphere: starfield + distant lanterns drifting up ──────────────────
  const starMats = [];
  for (let layer = 0; layer < 3; layer++) {
    const n = 130;
    const posArr = new Float32Array(n * 3);
    for (let i = 0; i < n * 3; i += 3) {
      posArr[i] = (Math.random() - 0.5) * 90;
      posArr[i + 1] = 6 + Math.random() * 40;
      posArr[i + 2] = -25 - Math.random() * 40;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    const m = new THREE.PointsMaterial({
      color: 0xfff6e0, size: 0.18 + layer * 0.1, transparent: true,
      opacity: 0.5, depthWrite: false,
    });
    starMats.push(m);
    scene.add(new THREE.Points(g, m));
  }
  // distant lanterns: soft warm glow sprites, dimmer with depth, rising slowly
  const bgLanterns = [];
  const bgTex = flameSpriteTexture(THREE);
  for (let i = 0; i < 14; i++) {
    const depth = -14 - Math.random() * 30;
    const s = new THREE.Sprite(new THREE.SpriteMaterial({
      map: bgTex, transparent: true, depthWrite: false,
      color: 0xffa050,
      opacity: (0.16 + Math.random() * 0.3) * (1 - (-depth - 14) / 50),
    }));
    const sc = 0.35 + Math.random() * 0.6;
    s.scale.set(sc, sc * 1.35, 1);
    s.position.set((Math.random() - 0.5) * 34, Math.random() * 16, depth);
    bgLanterns.push({ s, speed: 0.10 + Math.random() * 0.22, phase: Math.random() * 9 });
    scene.add(s);
  }

  new GLTFLoader().load('assets/skyLantern.glb', (gltf) => {
    const meshes = [];
    gltf.scene.traverse((obj) => { if (obj.isMesh) meshes.push(obj); });
    for (const obj of meshes) {
      {
        const isCap = obj.material && obj.material.name === 'cap';
        obj.material = isCap ? capMat : bodyMat;
        if (!isCap) {
          // organic paper wrinkles — gentle radial ripples, fading to zero
          // at the rim so the cap-tuck seam can't reopen
          const pos = obj.geometry.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
            const ang = Math.atan2(z, x);
            const fade = Math.min(1, Math.max(0, (2.0 - y) / 0.5));
            const disp = Math.sin(ang * 9 + y * 7) * Math.cos(y * 4.2 + ang) * 0.016 * fade;
            pos.setXYZ(i, x + Math.cos(ang) * disp, y, z + Math.sin(ang) * disp);
          }
          pos.needsUpdate = true;
        }
        if (isCap) {
          // cap exports flat-shaded — weld + recompute so it lights like the body
          obj.geometry = mergeVertices(obj.geometry);
          obj.geometry.computeVertexNormals();
          // edge shadow matching the body's baked crease — darken toward each
          // face's left/right edge so the cap silhouette reads like the body
          const cpos = obj.geometry.attributes.position;
          const ccol = new Float32Array(cpos.count * 3);
          for (let i = 0; i < cpos.count; i++) {
            const b = creaseBrightness(cpos.getX(i), cpos.getZ(i));
            ccol[i * 3] = ccol[i * 3 + 1] = ccol[i * 3 + 2] = b;
          }
          obj.geometry.setAttribute('color', new THREE.BufferAttribute(ccol, 3));
          // tuck the cap a hair inward (and barely down) so its rim hides
          // INSIDE the body wall — sinking it down alone made the rim poke
          // through where the body tapers
          obj.scale.set(0.99, 1, 0.99);
          obj.position.y -= 0.004;
        }
        // interior shell — same (already wrinkled) geometry, backfaces
        const inner = new THREE.Mesh(obj.geometry, interiorMat);
        inner.position.copy(obj.position);
        inner.scale.copy(obj.scale);
        obj.parent.add(inner);
      }
    }
    group.add(gltf.scene);
  }, undefined, () => {
    showCard('🏮', '無法載入天燈', '模型載入失敗，請稍後再試，或下載 App 觀看。');
  });

  const start = performance.now();
  function frame(nowMs) {
    const t = (nowMs - start) / 1000;
    const glow = Math.min(1, t / 1.2); // the shared lantern is already aloft — fade the flame in
    const flicker = 1 + 0.1 * Math.sin(t * 13) + 0.06 * Math.sin(t * 29 + 1.7);
    // intro float-up: start low (near the bottom edge), ease up to rest
    const REST_Y = 1.5, START_Y = -3.6, RISE_DUR = 18.0;
    const riseP = Math.min(1, t / RISE_DUR);
    const rise = 1 - Math.pow(1 - riseP, 3); // easeOutCubic
    const baseY = START_Y + (REST_Y - START_Y) * rise;
    group.position.set(Math.sin(t * 0.55) * 0.35, baseY + Math.sin(t * 0.8) * 0.08, 0);
    if (!draggingYaw) { userYaw += yawVel; yawVel *= 0.94; }
    group.rotation.y = 0.32 * Math.sin(t * 0.35) + t * 0.12 + userYaw;
    flameLight.intensity = glow * 5 * flicker;
    flame.material.opacity = glow * 0.95;
    flame.scale.set(0.85 * flicker, 1.1 * flicker, 1);
    const coreFlicker = 1 + 0.16 * Math.sin(t * 17 + 0.7) + 0.08 * Math.sin(t * 31);
    flameCore.material.opacity = glow;
    flameCore.scale.set(0.55 * coreFlicker, 0.85 * coreFlicker, 1);
    flameCore.position.x = 0.015 * Math.sin(t * 11);
    bodyMat.emissiveIntensity = glow * 0.95 * flicker;
    // the glow atlas's gradient multiply happened in sRGB space; the GPU
      // linearizes texels, so the body top's effective emissive is
      // srgbToLinear(56/255) ≈ 0.04 — match it, not the raw 0.22
      capMat.emissiveIntensity = glow * 0.95 * 0.04 * flicker;
    // atmosphere: twinkle + slow lantern drift (wrap at the top)
    starMats[0].opacity = 0.42 + 0.18 * Math.sin(t * 0.9);
    starMats[1].opacity = 0.42 + 0.18 * Math.sin(t * 1.3 + 2.1);
    starMats[2].opacity = 0.42 + 0.18 * Math.sin(t * 1.7 + 4.2);
    for (const b of bgLanterns) {
      b.s.position.y += b.speed / 60;
      b.s.position.x += Math.sin(t * 0.4 + b.phase) * 0.002;
      if (b.s.position.y > 20) b.s.position.y = -1;
    }
    renderer.render(scene, camera);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/** type key in the URL fragment → renderer. */
const VIEWERS = {
  lantern: renderLantern,
};

// ── router ─────────────────────────────────────────────────────────────────

function route() {
  const m = location.hash.match(/^#([a-z][\w-]*)=(.+)$/);
  const render = m && VIEWERS[m[1]];
  if (render) render(m[2]);
  else showCard('🙏', '沒有可顯示的內容', '請透過 App 分享的連結開啟本頁。');
}

window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
